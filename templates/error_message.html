<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ status_code }} - {{ title }}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 45%, #80deea 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #1f2937;
            padding: 20px;
        }

        .error-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 48px 56px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(6, 33, 107, 0.15);
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .error-code {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #06216b 0%, #543ad5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .error-message {
            font-size: 15px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06216b 0%, #543ad5 100%);
            color: #fff;
            box-shadow: 0 8px 20px rgba(84, 58, 213, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
            border: 1px solid #e2e8f0;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">{{ status_code|default:"Error" }}</div>
        <h1 class="error-title">{{ title|default:"Something went wrong" }}</h1>
        <p class="error-message">{{ message|default:"Please try again later." }}</p>
        <div class="error-actions">
            <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
            <a href="/login/" class="btn btn-primary">Go to Login</a>
        </div>
    </div>
</body>
</html>
