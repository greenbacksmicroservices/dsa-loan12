{% extends "base/base.html" %}

{% block navbar_title %}SubAdmin Dashboard{% endblock %}

{% block sidebar %}
    <div class="sidebar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding-top: 70px;">
        <div class="p-3">
            <h5 class="text-white mb-3">SubAdmin Menu</h5>
            <nav class="nav flex-column">
                <a href="{% url 'subadmin_dashboard' %}" class="nav-link text-light {% if request.resolver_match.url_name == 'subadmin_dashboard' %}active bg-white text-primary{% endif %}">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="{% url 'subadmin_all_loans' %}" class="nav-link text-light {% if request.resolver_match.url_name == 'subadmin_all_loans' %}active bg-white text-primary{% endif %}">
                    <i class="fas fa-file-alt"></i> All Loans
                </a>
                <a href="{% url 'subadmin_all_agents' %}" class="nav-link text-light">
                    <i class="fas fa-user-tie"></i> My Agents
                </a>
                <a href="{% url 'subadmin_profile' %}" class="nav-link text-light">
                    <i class="fas fa-user-circle"></i> Profile
                </a>
                <hr class="border-light">
                <a href="{% url 'logout' %}" class="nav-link text-danger">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </div>
    </div>
{% endblock %}

{% block page_title %}SubAdmin Panel - {% block subadmin_page_title %}Dashboard{% endblock %}{% endblock %}
