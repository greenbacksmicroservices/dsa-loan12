{% extends 'core/admin/admin_base.html' %}
{% load static %}

{% block title %}Add New Employee - Admin Panel{% endblock %}

{% block content %}
<style>
    .page-wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
    }

    .card-box {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
        padding: 24px;
    }

    .card-title {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        color: #111827;
    }

    .card-subtitle {
        margin: 8px 0 20px;
        color: #4b5563;
        font-size: 14px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
    }

    .field {
        display: flex;
        flex-direction: column;
    }

    .field label {
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 700;
        color: #1f2937;
    }

    .field input,
    .field select {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
        color: #111827;
        outline: none;
    }

    .field input:focus,
    .field select:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .actions {
        margin-top: 22px;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }

    .btn {
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-primary {
        background: #2563eb;
        color: #fff;
    }

    .btn-secondary {
        background: #e5e7eb;
        color: #1f2937;
    }

    .msg {
        display: none;
        margin-bottom: 14px;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
    }

    .msg.success {
        display: block;
        background: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
    }

    .msg.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
    }

    .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
        .page-wrap {
            padding: 16px;
        }

        .form-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="page-wrap">
    <div class="card-box">
        <h1 class="card-title">Add New Employee</h1>
        <p class="card-subtitle">Only basic details are required.</p>

        <div id="formMessage" class="msg"></div>

        <form id="employeeForm" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            <div class="form-grid">
                <div class="field">
                    <label for="fullName">Name *</label>
                    <input type="text" id="fullName" name="full_name" placeholder="Employee full name" required>
                </div>
                <div class="field">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>
                <div class="field">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="10-15 digits" required>
                </div>
                <div class="field">
                    <label for="gender">Gender *</label>
                    <select id="gender" name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other" selected>Other</option>
                    </select>
                </div>
                <div class="field">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" placeholder="City" required>
                </div>
                <div class="field">
                    <label for="district">District *</label>
                    <input type="text" id="district" name="district" placeholder="District" required>
                </div>
                <div class="field">
                    <label for="pinCode">PIN Code *</label>
                    <input type="text" id="pinCode" name="pin_code" placeholder="6-digit PIN" pattern="[0-9]{6}" maxlength="6" required>
                </div>
                <div class="field">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="Minimum 6 characters" minlength="6" required>
                </div>
            </div>

            <div class="actions">
                <a href="{% url 'employee_management' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="spinner" id="spinner"></span>
                    <span id="submitBtnText">Save Employee</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
const form = document.getElementById('employeeForm');
const submitBtn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const formMessage = document.getElementById('formMessage');

function showMessage(message, type) {
    formMessage.textContent = message;
    formMessage.className = `msg ${type}`;
}

form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const city = document.getElementById('city').value.trim();
    const district = document.getElementById('district').value.trim();
    const pinCode = document.getElementById('pinCode').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!fullName || !email || !phone || !city || !district || !pinCode || !password) {
        showMessage('Please fill all required fields.', 'error');
        return;
    }

    if (!/^\d{10,15}$/.test(phone)) {
        showMessage('Phone number must be 10-15 digits.', 'error');
        return;
    }

    if (!/^\d{6}$/.test(pinCode)) {
        showMessage('PIN code must be 6 digits.', 'error');
        return;
    }

    if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
    }

    submitBtn.disabled = true;
    spinner.style.display = 'inline-block';

    try {
        const formData = new FormData(form);
        const response = await fetch('/api/employees/add/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
            }
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.error || 'Failed to add employee');
        }

        showMessage(result.message || 'Employee added successfully!', 'success');
        setTimeout(() => {
            window.location.href = '{% url "employee_management" %}';
        }, 900);
    } catch (error) {
        showMessage(error.message || 'Error adding employee.', 'error');
    } finally {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
    }
});
</script>
{% endblock %}
