{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: url('{% static "images/login-rupee-bg.jpg" %}') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Dark gradient overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(3, 16, 82, 0.72), rgba(2, 26, 124, 0.78));
            z-index: -1;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            color: #fff;
        }

        .login-box h2 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-control {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.6);
            border-radius: 0;
            color: #fff;
            padding: 10px 5px;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .form-control:focus {
            background: transparent;
            border-bottom-color: #fff;
            box-shadow: none;
            color: #fff;
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap .form-control {
            padding-right: 42px;
        }

        .password-toggle-btn {
            position: absolute;
            right: 2px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.85);
            padding: 6px 8px;
            cursor: pointer;
        }

        .password-toggle-btn:hover {
            color: #ffffff;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .options a {
            color: #fff;
            text-decoration: none;
        }

        .options a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            border-radius: 30px;
            background: #fff;
            color: #2c0660;
            font-weight: 600;
            padding: 12px;
            border: none;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .register-section {
            text-align: center;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .register-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .register-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-register {
            flex: 1;
            padding: 11px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-register:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .website-home-link {
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .website-home-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.26);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-1px);
        }

        .register {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .register a {
            color: #fff;
            font-weight: 600;
            text-decoration: none;
        }

        .register a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔐 Login</h2>

    {% if messages %}
        <div class="alert alert-danger alert-dismissible fade show mb-3" role="alert" style="background: rgba(220, 53, 69, 0.8); border: 1px solid rgba(220, 53, 69, 0.5);">
            {% for message in messages %}
                <strong>Error!</strong> {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: brightness(2);"></button>
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST" action="/login/" id="loginForm">
        {% csrf_token %}

        <div class="form-group">
            <input type="text" name="email" class="form-control" placeholder="Email or Username" required autofocus>
        </div>

        <div class="form-group">
            <div class="password-wrap">
                <input type="password" id="loginPassword" name="password" class="form-control" placeholder="Password" required>
                <button type="button" class="password-toggle-btn" onclick="togglePassword('loginPassword', this)" aria-label="Show password">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" name="remember_me"> Remember Me
            </label>
            <a href="{% url 'password_reset' %}">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Log in
        </button>
    </form>

    <!-- Registration Section -->
    <div class="register-section">
        <div class="register-title">New to DSA Loans Registration?</div>
        <div class="register-buttons">
            <button type="button" class="btn-register" onclick="window.location='/register/employee/step/1/';" style="border: none; cursor: pointer;">
                <i class="bi bi-person-badge"></i> Employee Registration
            </button>
            <button type="button" class="btn-register" onclick="window.location='/register/agent/step/1/';" style="border: none; cursor: pointer;">
                <i class="bi bi-handshake"></i> Agent Registration
            </button>
        </div>
        <a class="website-home-link" href="https://elitedreamcapital.com/">
            <i class="bi bi-house-door-fill"></i> Return to my website
        </a>
    </div>
</div>

</body>
<script>
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const icon = button.querySelector('i');
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        if (icon) {
            icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        }
    }

    // Prevent any sidebar toggles on this page
    document.addEventListener('DOMContentLoaded', function() {
        // Disable sidebar functionality
        const sidebar = document.querySelector('.sidebar');
        if (sidebar) {
            sidebar.style.display = 'none';
        }
        document.body.classList.remove('sidebar-open');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
