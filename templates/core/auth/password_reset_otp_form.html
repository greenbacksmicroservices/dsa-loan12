<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: #eef2ff; font-family: 'Segoe UI', sans-serif; }
        .card-wrap { width: 100%; max-width: 460px; background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12); }
        .hint { font-size: 13px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card-wrap">
        <h4 class="mb-2">Forgot Password</h4>
        <p class="hint mb-4">Enter your registered email. We will send a 6-digit OTP instantly.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" value="{{ email|default:'' }}" placeholder="name@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send OTP</button>
        </form>

        <a href="{% url 'login' %}" class="btn btn-link w-100 mt-2 text-decoration-none">Back to Login</a>
    </div>
</body>
</html>
