<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Updated</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .box { width: 100%; max-width: 460px; background: #fff; border-radius: 14px; padding: 28px; text-align: center; box-shadow: 0 14px 28px rgba(15, 23, 42, 0.1); }
    </style>
</head>
<body>
    <div class="box">
        <h4 class="mb-2">Password Updated</h4>
        <p class="text-muted">Your new password has been set successfully.</p>
        <a href="{% url 'login' %}" class="btn btn-primary mt-2">Login Now</a>
    </div>
</body>
</html>
