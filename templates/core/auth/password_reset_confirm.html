<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: #eef2ff; font-family: 'Segoe UI', sans-serif; }
        .panel { width: 100%; max-width: 520px; background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 16px 32px rgba(15, 23, 42, 0.14); }
        .panel input { margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="panel">
        <h4 class="mb-3">Set New Password</h4>
        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.new_password1 }}
                {{ form.new_password2 }}
                <button type="submit" class="btn btn-success w-100 mt-2">Update Password</button>
            </form>
        {% else %}
            <div class="alert alert-danger mb-0">This reset link is invalid or expired. Please request a new one.</div>
            <a href="{% url 'password_reset' %}" class="btn btn-primary w-100 mt-3">Request New Link</a>
        {% endif %}
    </div>
</body>
</html>
