<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .box { width: 100%; max-width: 520px; background: #fff; border-radius: 14px; padding: 30px; box-shadow: 0 14px 30px rgba(15, 23, 42, 0.1); text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h4 class="mb-3">Reset Link Sent</h4>
        <p class="text-muted mb-3">If your email exists in our system, you will receive a password reset link shortly.</p>
        <a class="btn btn-primary" href="{% url 'login' %}">Go to Login</a>
    </div>
</body>
</html>
