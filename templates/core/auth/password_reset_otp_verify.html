<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .otp-panel { width: 100%; max-width: 500px; background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1); }
        .otp-input { letter-spacing: 10px; text-align: center; font-size: 24px; font-weight: 600; }
        .hint { font-size: 13px; color: #64748b; }
    </style>
</head>
<body>
    <div class="otp-panel">
        <h4 class="mb-2">Verify OTP</h4>
        <p class="hint mb-4">
            OTP sent to <strong>{{ masked_email }}</strong>. Valid for {{ otp_validity_seconds|default:300|floatformat:0 }} seconds.
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" class="mb-3">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="action" value="verify">
            <div class="mb-3">
                <label class="form-label">6-digit OTP</label>
                <input
                    id="otpInput"
                    type="text"
                    name="otp"
                    class="form-control otp-input"
                    maxlength="6"
                    pattern="[0-9]{6}"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    placeholder="000000"
                    required
                >
            </div>
            <button type="submit" class="btn btn-primary w-100">Verify OTP</button>
        </form>

        <form method="post" class="d-grid">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="action" value="resend">
            <button id="resendBtn" type="submit" class="btn btn-outline-secondary">
                Resend OTP
            </button>
        </form>
        <p class="hint text-center mt-2 mb-0">
            <span id="cooldownText"></span>
        </p>

        <a href="{% url 'password_reset' %}" class="btn btn-link w-100 mt-2 text-decoration-none">Change Email</a>
        <a href="{% url 'login' %}" class="btn btn-link w-100 text-decoration-none">Back to Login</a>
    </div>

    <script>
        const resendBtn = document.getElementById('resendBtn');
        const cooldownText = document.getElementById('cooldownText');
        let remaining = Number('{{ cooldown_remaining|default:0 }}') || 0;
        const otpInput = document.getElementById('otpInput');

        if (otpInput) {
            otpInput.addEventListener('input', () => {
                otpInput.value = (otpInput.value || '').replace(/\D/g, '').slice(0, 6);
            });
        }

        function updateCooldown() {
            if (!resendBtn || !cooldownText) return;
            if (remaining > 0) {
                resendBtn.disabled = true;
                cooldownText.textContent = `Resend available in ${remaining}s`;
                remaining -= 1;
            } else {
                resendBtn.disabled = false;
                cooldownText.textContent = 'You can resend OTP now.';
            }
        }

        updateCooldown();
        setInterval(updateCooldown, 1000);
    </script>
</body>
</html>
