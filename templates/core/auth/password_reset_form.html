<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        .card-wrap { width: 100%; max-width: 460px; background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 16px 30px rgba(15, 23, 42, 0.12); }
    </style>
</head>
<body>
    <div class="card-wrap">
        <h4 class="mb-2">Forgot Password</h4>
        <p class="text-muted small mb-4">Enter your account email. We will send a reset link.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email address</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>
        <a href="{% url 'login' %}" class="btn btn-link w-100 mt-2 text-decoration-none">Back to Login</a>
    </div>
</body>
</html>
