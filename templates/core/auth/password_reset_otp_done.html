<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; background: #ecfeff; font-family: 'Segoe UI', sans-serif; }
        .done-box { width: 100%; max-width: 520px; background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1); text-align: center; }
        .hint { font-size: 14px; color: #475569; }
    </style>
</head>
<body>
    <div class="done-box">
        <h4 class="mb-2">Password Reset Successful</h4>
        <p class="hint mb-1">A new password has been sent to your email.</p>
        {% if masked_email %}
            <p class="hint mb-3"><strong>{{ masked_email }}</strong></p>
        {% endif %}
        <p class="hint mb-4">Please login using the new password and change it immediately from settings.</p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100">Go to Login</a>
    </div>
</body>
</html>
