{% extends "base/subadmin_base.html" %}

{% block subadmin_page_title %}All Loans{% endblock %}

{% block page_content %}
<div class="container-fluid">
    <!-- SEARCH & FILTER - NO WIDGETS HERE -->
    <div class="row mb-4">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <input 
                                type="text" 
                                class="form-control" 
                                id="search-loans" 
                                placeholder="Search by applicant name or phone..."
                            >
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="filter-status">
                                <option value="">All Status</option>
                                <option value="new_entry">New Entry</option>
                                <option value="processing">Processing</option>
                                <option value="approved">Approved</option>
                                <option value="rejected">Rejected</option>
                                <option value="disbursed">Disbursed</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-primary" id="btn-search">
                                <i class="fas fa-search"></i> Search
                            </button>
                            <button class="btn btn-outline-secondary" id="btn-reset">
                                <i class="fas fa-redo"></i> Reset
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- LOANS TABLE - LISTING ONLY -->
    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h5 class="card-title mb-0">My Loan Applications</h5>
                    <span class="badge bg-light text-dark" id="total-count">0</span>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped" id="loans-table">
                            <thead style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                                <tr>
                                    <th>Applicant Name</th>
                                    <th>Agent</th>
                                    <th>Loan Amount</th>
                                    <th>Status</th>
                                    <th>Submission Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="loans-tbody">
                                <tr>
                                    <td colspan="6" class="text-center text-muted py-3">
                                        <i class="fas fa-spinner fa-spin"></i> Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- PAGINATION -->
                    <nav aria-label="Page navigation" class="mt-3">
                        <ul class="pagination justify-content-center" id="pagination"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    const itemsPerPage = 10;
    let allLoans = [];

    document.addEventListener('DOMContentLoaded', function() {
        loadLoans();
        setupEventListeners();
    });

    function setupEventListeners() {
        document.getElementById('btn-search').addEventListener('click', () => {
            currentPage = 1;
            loadLoans();
        });
        
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('search-loans').value = '';
            document.getElementById('filter-status').value = '';
            currentPage = 1;
            loadLoans();
        });
        
        document.getElementById('search-loans').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                currentPage = 1;
                loadLoans();
            }
        });
    }

    function loadLoans() {
        const searchQuery = document.getElementById('search-loans').value;
        const statusFilter = document.getElementById('filter-status').value;
        
        fetch(`{% url 'api_subadmin_all_loans' %}?search=${searchQuery}&status=${statusFilter}`)
            .then(response => response.json())
            .then(data => {
                allLoans = data.loans || [];
                document.getElementById('total-count').textContent = allLoans.length;
                renderTable();
                renderPagination();
            })
            .catch(error => {
                console.error('Error loading loans:', error);
                document.getElementById('loans-tbody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-danger">
                            Error loading loans
                        </td>
                    </tr>
                `;
            });
    }

    function renderTable() {
        const tbody = document.getElementById('loans-tbody');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageLoans = allLoans.slice(start, end);

        if (pageLoans.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" class="text-center text-muted py-3">
                        No loans found
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = pageLoans.map(loan => `
            <tr>
                <td><strong>${loan.applicant_name || 'N/A'}</strong></td>
                <td>${loan.agent_name || 'N/A'}</td>
                <td class="text-success">$${parseFloat(loan.loan_amount || 0).toFixed(2)}</td>
                <td>
                    <span class="badge bg-${getStatusBadgeColor(loan.status)}">
                        ${loan.status || 'Unknown'}
                    </span>
                </td>
                <td>${new Date(loan.submission_date).toLocaleDateString()}</td>
                <td>
                    <a href="/subadmin/loans/${loan.id}/" class="btn btn-sm btn-info" title="View">
                        <i class="fas fa-eye"></i>
                    </a>
                </td>
            </tr>
        `).join('');
    }

    function renderPagination() {
        const pagination = document.getElementById('pagination');
        const totalPages = Math.ceil(allLoans.length / itemsPerPage);

        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        
        html += `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">
                    Previous
                </a>
            </li>
        `;
        
        for (let i = 1; i <= totalPages; i++) {
            if (i === currentPage) {
                html += `<li class="page-item active"><span class="page-link">${i}</span></li>`;
            } else {
                html += `
                    <li class="page-item">
                        <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
                    </li>
                `;
            }
        }
        
        html += `
            <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">
                    Next
                </a>
            </li>
        `;
        
        pagination.innerHTML = html;
    }

    function changePage(page) {
        const totalPages = Math.ceil(allLoans.length / itemsPerPage);
        if (page >= 1 && page <= totalPages) {
            currentPage = page;
            renderTable();
            renderPagination();
            window.scrollTo(0, 0);
        }
    }

    function getStatusBadgeColor(status) {
        const colors = {
            'new_entry': 'info',
            'processing': 'warning',
            'approved': 'success',
            'rejected': 'danger',
            'disbursed': 'secondary'
        };
        return colors[status] || 'secondary';
    }
</script>
{% endblock %}
