<div class="document-password-wrap" style="margin-top: 8px;">
    <label class="document-password-toggle" style="display:flex; align-items:center; gap:8px; font-size:13px; color:#475569; cursor:pointer;">
        <input type="checkbox" class="document-has-password" name="document_has_password[]" value="1">
        <span>This document has password</span>
    </label>
    <div class="document-password-input-wrap" style="display:none; margin-top:8px; max-width:420px;">
        <div class="input-group">
            <input type="password"
                   class="form-control document-password-input"
                   name="document_password[]"
                   placeholder="Enter document password"
                   autocomplete="new-password">
            <button type="button" class="btn btn-outline-secondary document-password-visibility-btn" tabindex="-1">Show</button>
        </div>
    </div>
</div>
